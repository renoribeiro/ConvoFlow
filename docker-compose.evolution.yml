version: '3.8'

services:
  evolution-api:
    image: atendai/evolution-api:v2.1.1
    container_name: evolution-api
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      # Server Configuration
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - SERVER_URL=http://localhost:8081
      
      # CORS Configuration
      - CORS_ORIGIN=*
      - CORS_METHODS=GET,POST,PUT,DELETE,OPTIONS
      - CORS_CREDENTIALS=true
      
      # Database Configuration (PostgreSQL)
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:evolution@postgres:5432/evolution
      - DATABASE_CONNECTION_CLIENT_NAME=evolution
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      
      # Redis Configuration
      - REDIS_ENABLED=true
      - REDIS_URI=redis://redis:6379
      - REDIS_PREFIX_KEY=evolution
      
      # RabbitMQ Configuration
      - RABBITMQ_ENABLED=false
      
      # Webhook Configuration
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=http://host.docker.internal:3000/api/webhook
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=true
      - WEBHOOK_GLOBAL_EVENTS=APPLICATION_STARTUP,QRCODE_UPDATED,CONNECTION_UPDATE,STATUS_INSTANCE,MESSAGES_UPSERT,MESSAGES_UPDATE,MESSAGES_DELETE,SEND_MESSAGE,CONTACTS_UPSERT,CONTACTS_UPDATE,PRESENCE_UPDATE,CHATS_UPSERT,CHATS_UPDATE,CHATS_DELETE,GROUPS_UPSERT,GROUPS_UPDATE,GROUP_PARTICIPANTS_UPDATE,GROUP_UPDATE,CALL
      - WEBHOOK_GLOBAL_IGNORE_JID=status@broadcast
      - WEBHOOK_BASE64=false
      
      # Instance Configuration
      - CONFIG_SESSION_PHONE_CLIENT=ConvoFlow
      - CONFIG_SESSION_PHONE_NAME=ConvoFlow Bot
      
      # QR Code Configuration
      - QRCODE_LIMIT=10
      - QRCODE_COLOR=#198754
      
      # Authentication
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=convoflow-evolution-api-key-2024
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      - AUTHENTICATION_JWT_EXPIRES_IN=0
      - AUTHENTICATION_JWT_SECRET=convoflow-jwt-secret-2024
      
      # Language
      - LANGUAGE=pt-BR
      
      # Logs
      - LOG_LEVEL=WARN
      - LOG_COLOR=true
      - LOG_BAILEYS=error
      - LOG_WEBHOOK=false
      
      # Store Configuration
      - STORE_MESSAGES=true
      - STORE_MESSAGE_UP=true
      - STORE_CONTACTS=true
      - STORE_CHATS=true
      
      # Clean Store
      - CLEAN_STORE_CLEANING_INTERVAL=7200
      - CLEAN_STORE_MESSAGES=true
      - CLEAN_STORE_MESSAGE_UP=true
      - CLEAN_STORE_CONTACTS=true
      - CLEAN_STORE_CHATS=true
      
      # Instance Delete
      - DEL_INSTANCE=false
      
      # Typebot Integration
      - TYPEBOT_ENABLED=false
      
      # Chatwoot Integration
      - CHATWOOT_ENABLED=false
      
      # OpenAI Integration
      - OPENAI_ENABLED=false
      
      # Dify Integration
      - DIFY_ENABLED=false
      
      # S3 Configuration
      - S3_ENABLED=false
      
      # Minio Configuration
      - MINIO_ENABLED=false
      
      # Websocket
      - WEBSOCKET_ENABLED=true
      - WEBSOCKET_GLOBAL_EVENTS=APPLICATION_STARTUP,QRCODE_UPDATED,CONNECTION_UPDATE,STATUS_INSTANCE,MESSAGES_UPSERT,MESSAGES_UPDATE,CONTACTS_UPSERT,PRESENCE_UPDATE,CHATS_UPSERT
      
      # Security Configuration
      - WEBHOOK_SECRET=convoflow-webhook-secret-2024
      - API_KEY_HEADER=x-api-key
      - VALIDATE_WEBHOOK_URL=true
      
      # Rate Limiting
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_MAX=100
      - RATE_LIMIT_WINDOW=60000
      
      # Cache Configuration
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_PREFIX_KEY=evolution:cache
      - CACHE_REDIS_TTL=3600
      
      # Message Configuration
      - MESSAGE_FULL_DOMAIN_WEBHOOK=true
      - MESSAGE_BASE64=false
    
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    
    depends_on:
      - postgres
      - redis
    
    networks:
      - evolution-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/manager/instance/fetchInstances"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15-alpine
    container_name: evolution-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=evolution
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=evolution
      - PGDATA=/var/lib/postgresql/data/pgdata
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
    networks:
      - evolution-network
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: evolution-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --replica-read-only no
    
    volumes:
      - redis_data:/data
    
    networks:
      - evolution-network
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  evolution_instances:
    driver: local
  evolution_store:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  evolution-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16