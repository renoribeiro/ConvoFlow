project_id = "pqjkuwyshybxldzpfbbs"

[functions.evolution-webhook]
# Evolution calls this webhook externally without a Supabase JWT; the function
# authenticates each request via the per-instance apikey (and optional
# EVOLUTION_WEBHOOK_SECRET). Must stay false or the gateway 401s real webhooks.
verify_jwt = false

[functions.waha-webhook]
# WAHA does not send a JWT; we authenticate via a shared secret header
# (WAHA_WEBHOOK_SECRET). See supabase/functions/waha-webhook/index.ts.
verify_jwt = false

[functions.automation-processor]
# Called server-to-server (DB trigger or other Edge Functions) with
# service_role. Tenant isolation is enforced inside the handler.
verify_jwt = true

[functions.stripe-webhook]
# Stripe signs payloads with Stripe-Signature; the handler verifies the
# signature, so JWT verification is disabled at the gateway.
verify_jwt = false

[functions.job-worker]
verify_jwt = true

[functions.meta-webhook]
verify_jwt = false

[functions.whatsapp-meta-setup]
verify_jwt = true

[functions.whatsapp-send-message]
verify_jwt = true

[functions.manage-user]
verify_jwt = true

[functions.track-login]
verify_jwt = true

[functions.usage-limits]
verify_jwt = true

[functions.admin-create-user]
verify_jwt = true

[functions.send-report]
# Gera relatório com dados reais do tenant e envia por e-mail (Resend).
# Autentica o caller pelo JWT e resolve o tenant_id internamente.
verify_jwt = true

[functions.process-chatbot-message]
# Called server-to-server only (from evolution-webhook, waha-webhook,
# meta-webhook). No user JWT is available in webhook context, so JWT
# verification is disabled. Origin is validated inside the handler via
# the CHATBOT_ENGINE_SECRET shared secret (x-internal-secret header).
verify_jwt = false